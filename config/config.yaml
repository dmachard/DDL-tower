# DDLtower - Generic Configuration File

# --- General System Settings ---
app_name: "DDL Tower"
debug: true

# --- Database Configuration ---
database_url: "sqlite+aiosqlite:///./data/ddl.db"

# Download Settings
download_dir: "/app/data/download"
library_movies_dir: "/app/data/films"
library_series_dir: "/app/data/series"
library_youtube_dir: "/app/data/youtube"
data_export_dir: "/app/data/export"
delete_rar_after_extraction: true
keep_only_video_files: true

# --- Downloader API Settings ---
downloader:
  alldebrid:
    api_key: "[YOUR_KEY]"
  realdebrid:
    api_key: "[YOUR_KEY]"
  bestdebrid:
    api_key: "[YOUR_KEY]"

# TMDB API Settings
tmdb:
  api_key: "[YOUR_KEY]"

# Translation Settings
mymemory:
  email: "[EMAIL_ADDRESS]"

# Default language (fr or en)
default_language: en

# Git Configuration (for automatic export push)
git:
  enabled: false
  repo_url: "[GIT_REPO_URL]"
  branch: "main"
  username: "[GIT_USERNAME]"
  email: "[GIT_EMAIL]"
  token: "[GIT_TOKEN]"
  clone_dir: "data/git_export"

# Auto Export Settings (after scrapers finish running)
auto_export:
  enabled: false
  type: "all" # options: all, data, stats


# --- Scraper Global Settings ---
scan_interval_minutes: 60
scan_novelty_multiplier: 2
concurrent_hoster_checks: 10

# --- Scheduler Settings ---
scan_start_hour: 6 
scan_end_hour: 0 

# Resolution filter: "720p", "480p", "DVD", "SD"
ignore_resolutions: []

# Automatic download settings
auto_download_series_packs: true

# Browser connection for Webtop/Cloudflare bypass
browser_url: "http://ddltower-browser:9222"
webtop_container_name: "ddltower-browser"

# --- Direct & Global Extraction Patterns ---
direct_scan_patterns:
  - "https://www.youtube.com/feeds/videos.xml?channel_id="

# --- Global Unlockers ---
unlockers:
  - name: "Example-Input-Unlocker"
    patterns:
      - 'https?://example-input-unlocker\.com/[^\s"''<>]+'
    wait_for: "#unlockBtn"
    click: "#unlockBtn"
    wait_result: ".result-input"
    extract_attribute: "value"
    skip_turnstile: true


# --- Automated Discovery Sources (Scrapers) ---
# Note: You can add `schedule_hour: <0-23>` at the source level (e.g. `schedule_hour: 1` to run at 01:00).
# Sources with `schedule_hour` will run only once per day during that specific hour,
# and will completely ignore the global scheduler settings (scan_interval_minutes, scan_start_hour, scan_end_hour).
sources:

          
  - name: "YouTube source"
    schedule_hour: 1  # Example: Scrape only once a day at 01:00
    steps:
      - name: "rss_feed"
        url: "http://www.youtube.com/feeds/videos.xml?channel_id="
        type: "rss"
        auto_download: true
        category: "youtube"
      
  - name: "Custom source"
    steps:
      - name: "index"
        url: "https://example.com/index"
        type: "html"
        follow_links: true
        dig_patterns_url:
          - 'https?://example\.com/post/[\w-]+'

      - name: "post_page"
        url: "{{ index }}"
        type: "html"
        use_browser: true
        item_delay: 2.0
        wait_for: ".download-button"
        debug: true
        hoster_patterns_url:
          - 'href=["''](https?://(?:www\.)?file\.com/\?[\w-]+)[^"'']*["'']'