# DDLtower - Generic Configuration File

# --- General System Settings ---
app_name: "DDL Tower"
debug: true

# --- Database Configuration ---
# Default to data folder inside the project
database_url: "sqlite+aiosqlite:///./data/ddl.db"

# Download Settings
download_dir: "/app/data/download"
library_movies_dir: "/app/data/films"
library_series_dir: "/app/data/series"
delete_rar_after_extraction: true
keep_only_video_files: true

# --- Downloader API Settings ---
# You can also use the ALLDEBRID_API_KEY or REALDEBRID_API_KEY environment variables
downloader:
  alldebrid:
    api_key: "[YOUR_KEY]"
  realdebrid:
    api_key: "[YOUR_KEY]"
  bestdebrid:
    api_key: "[YOUR_KEY]"

# TMDB API Settings
tmdb:
  api_key: "[YOUR_KEY]"

# Translation Settings
mymemory:
  email: "[EMAIL_ADDRESS]"

# Default language (fr or en)
default_language: en

# --- Scraper Global Settings ---
# Frequency of the automated discovery scans (in minutes)
scan_interval_minutes: 60
# Multiplier to determine novelty threshold (scan_interval * multiplier)
scan_novelty_multiplier: 2

# Browser connection for Webtop/Cloudflare bypass (uncomment to use)
browser_url: "http://ddltower-browser:9222"
webtop_container_name: "ddltower-browser"

# --- Direct & Global Extraction Patterns ---
# Regular expressions used to identify download links on any page
direct_scan_patterns:
  - 'https?://(?:www\.)?1fichier\.com/(?:\?)?[^\s"''<>]+'
  - 'https?://(?:www\.)?rapidgator\.net/file/[^\s"''<>]+'
  - 'https?://(?:www\.)?nitroflare\.com/view/[^\s"''<>]+'

