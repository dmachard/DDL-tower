# DDLtower - Generic Configuration File

# --- General System Settings ---
app_name: "DDL Tower"
debug: true

# --- Database Configuration ---
database_url: "sqlite+aiosqlite:///./data/ddl.db"

# Download Settings
download_dir: "/app/data/download"
library_movies_dir: "/app/data/films"
library_series_dir: "/app/data/series"
delete_rar_after_extraction: true
keep_only_video_files: true

# --- Downloader API Settings ---
downloader:
  alldebrid:
    api_key: "[YOUR_KEY]"
  realdebrid:
    api_key: "[YOUR_KEY]"
  bestdebrid:
    api_key: "[YOUR_KEY]"

# TMDB API Settings
tmdb:
  api_key: "[YOUR_KEY]"

# Translation Settings
mymemory:
  email: "[EMAIL_ADDRESS]"

# Default language (fr or en)
default_language: en

# --- Scraper Global Settings ---
scan_interval_minutes: 60
scan_novelty_multiplier: 2
concurrent_hoster_checks: 10

scan_start_hour: 6 
scan_end_hour: 0 

# Browser connection for Webtop/Cloudflare bypass
browser_url: "http://ddltower-browser:9222"
webtop_container_name: "ddltower-browser"

# --- Direct & Global Extraction Patterns ---
direct_scan_patterns:
  - 'https?://(?:www\.)?1fichier\.com/(?:\?)?[^\s"''<>]+'
  - 'https?://(?:www\.)?rapidgator\.net/file/[^\s"''<>]+'
  - 'https?://(?:www\.)?nitroflare\.com/view/[^\s"''<>]+'

# --- Automated Discovery Sources (Scrapers) ---
sources:
  - name: "MyComplexSource"
    is_chain: true
    steps:
      - name: "index"
        url: "https://example.com/index"
        type: "html"
        follow_links: true
        dig_patterns_url:
          - 'https?://example\.com/post/[\w-]+'

      - name: "post_page"
        url: "{{ index }}"
        type: "html"
        use_browser: true
        wait_for: ".download-button"
        debug: true 
        yield_links: true
        hoster_patterns_url:
          - 'href=["''](https?://(?:www\.)?file\.com/\?[\w-]+)[^"'']*["'']'
        unlock_patterns:
          - pattern: 'https?://(?:www\.)?mul\.(?:org|io)/[^\s"''<>]+'