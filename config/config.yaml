# DDLtower - Generic Configuration File

# --- General System Settings ---
app_name: "DDL Tower"
debug: true

# --- Database Configuration ---
# Default to data folder inside the project
database_url: "sqlite+aiosqlite:///./data/ddl.db"

# --- AllDebrid API Settings ---
# You can also use the ALLDEBRID_API_KEY environment variable
alldebrid:
  api_key: "YOUR_API_KEY_HERE"

# OMDb API Settings
omdb:
  api_key: "YOUR_API_KEY_HERE"
  language: "en"

# TMDB API Settings
tmdb:
  api_key: "ea9574c5bb8156b7082d08b6fd8cffbd"

# Translation Settings (MyMemory API)
translation:
  mymemory_email: "dmachard@gmail.com"

# Default language (fr or en)
default_language: en

# --- Scraper Global Settings ---
# Frequency of the automated discovery scans (in minutes)
scan_interval_minutes: 60
# Multiplier to determine novelty threshold (scan_interval * multiplier)
scan_novelty_multiplier: 2

# --- Direct & Global Extraction Patterns ---
# Regular expressions used to identify download links on any page
direct_scan_patterns:
  - 'https?://(?:www\.)?1fichier\.com/\?[\w-]+'
  - 'https?://(?:www\.)?rapidgator\.net/file/[\w-]+/[\w.-]+'
  - 'https?://(?:www\.)?nitroflare\.com/view/[\w-]+/[\w.-]+'

# --- Automated Discovery Sources (Scrapers) ---
sources:
  - name: "LinuxISO-Sample"
    entry_url: "https://example.com/linux-isos"
    entry_wait_for: ".content-loaded" # Optional selector to wait for (CSS/XPath)
    crawls:
      - pattern: 'https?://example\.com/subpage/[\w-]+' # Links to follow
        wait_for: "a[href*='1fichier.com']" # Wait condition for subpages
        scrape_once: true # Skip if already visited
    target_patterns: # list of patterns to search for all sub pages
      - 'https?://(?:www\.)?1fichier\.com/\?[\w-]+'

  - name: "Manual-Paste-Example"
    entry_url: "https://rentry.co/sample-links"
    target_patterns:
      - 'https?://(?:www\.)?1fichier\.com/\?[\w-]+'

  - name: "RSS-Example"
    rss_url: "https://example.com/rss"
    required_keywords:
      - "1fichier"
    click_selector: ".content-loaded"
    target_patterns:
      - 'https?://(?:www\.)?1fichier\.com/\?[\w-]+'
